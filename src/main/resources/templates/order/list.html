<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MES Shipment System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="mb-4">
        <h2 class="fw-bold">MES Shipment System</h2>
        <p class="text-muted">주문 등록 및 출고/택배 연동 관리</p>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-bold">
            주문 등록
        </div>

        <div class="card-body">
            <input type="hidden" id="orderId">

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">고객명</label>
                    <input type="text" id="customerName" class="form-control" placeholder="고객명">
                </div>

                <div class="col-md-4">
                    <label class="form-label">전화번호</label>
                    <input type="text" id="phone" class="form-control" placeholder="01012345678">
                </div>

                <div class="col-md-4">
                    <label class="form-label">수량</label>
                    <input type="number" id="qty" class="form-control" placeholder="수량">
                </div>

                <div class="col-md-6">
                    <label class="form-label">주소</label>
                    <input type="text" id="address" class="form-control" placeholder="주소">
                </div>

                <div class="col-md-6">
                    <label class="form-label">품목명</label>
                    <input type="text" id="itemName" class="form-control" placeholder="품목명">
                </div>
            </div>

            <div class="mt-4 text-end">
                <button class="btn btn-secondary" onclick="clearForm()">초기화</button>
                <button class="btn btn-primary" onclick="saveOrder()">저장</button>
                <button class="btn btn-outline-dark" onclick="getOrderList()">주문 목록 조회</button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
            <span>주문 목록</span>
            <span class="badge text-bg-primary" id="orderCount">0건</span>
        </div>

        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>주문ID</th>
                    <th>고객명</th>
                    <th>전화번호</th>
                    <th>주소</th>
                    <th>품목명</th>
                    <th>수량</th>
                    <th>상태</th>
                    <th>등록일</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody id="orderList">
                <tr>
                    <td colspan="9" class="text-center text-muted">데이터가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    function getFormData() {
        return {
            orderId: document.getElementById("orderId").value,
            customerName: document.getElementById("customerName").value,
            phone: document.getElementById("phone").value,
            address: document.getElementById("address").value,
            itemName: document.getElementById("itemName").value,
            qty: Number(document.getElementById("qty").value),
            status: "NEW"
        };
    }

    function validateForm(data) {
        if (!data.customerName) {
            alert("고객명을 입력해주세요.");
            return false;
        }

        if (!data.phone) {
            alert("전화번호를 입력해주세요.");
            return false;
        }

        if (!data.address) {
            alert("주소를 입력해주세요.");
            return false;
        }

        if (!data.itemName) {
            alert("품목명을 입력해주세요.");
            return false;
        }

        if (!data.qty || data.qty <= 0) {
            alert("수량을 입력해주세요.");
            return false;
        }

        return true;
    }

    function saveOrder() {
        const data = getFormData();

        if (!validateForm(data)) {
            return;
        }

        if (data.orderId) {
            updateOrder(data);
        } else {
            insertOrder(data);
        }
    }

    function insertOrder(data) {
        fetch("/api/v1/order/insert", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
            .then(response => response.json())
            .then(result => {
                alert("주문 등록 완료");
                clearForm();
                getOrderList();
            })
            .catch(error => {
                alert("주문 등록 실패");
                console.error(error);
            });
    }

    function updateOrder(data) {
        fetch("/api/v1/order/update", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
            .then(response => response.json())
            .then(result => {
                alert("주문 수정 완료");
                clearForm();
                getOrderList();
            })
            .catch(error => {
                alert("주문 수정 실패");
                console.error(error);
            });
    }

    function deleteOrder(orderId) {
        if (!confirm("주문을 삭제하시겠습니까?")) {
            return;
        }

        fetch("/api/v1/order/delete", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({orderId: orderId})
        })
            .then(response => response.json())
            .then(result => {
                alert("주문 삭제 완료");
                getOrderList();
            })
            .catch(error => {
                alert("주문 삭제 실패");
                console.error(error);
            });
    }

    function updateOrderStatus(orderId, status) {
        fetch("/api/v1/order/status", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                orderId: orderId,
                status: status
            })
        })
            .then(response => response.json())
            .then(result => {
                alert("상태 변경 완료");
                getOrderList();
            })
            .catch(error => {
                alert("상태 변경 실패");
                console.error(error);
            });
    }

    function getOrderList() {
        fetch("/api/v1/order/list", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            }
        })
            .then(response => response.json())
            .then(list => {
                const tbody = document.getElementById("orderList");
                const orderCount = document.getElementById("orderCount");

                tbody.innerHTML = "";
                orderCount.innerText = list.length + "건";

                if (!list || list.length === 0) {
                    tbody.innerHTML =
                        "<tr>" +
                        "<td colspan='9' class='text-center text-muted'>데이터가 없습니다.</td>" +
                        "</tr>";
                    return;
                }

                list.forEach(row => {
                    const tr = document.createElement("tr");

                    const orderId = row.ORDER_ID || "";
                    const customerName = row.CUSTOMER_NAME || "";
                    const phone = row.PHONE || "";
                    const address = row.ADDRESS || "";
                    const itemName = row.ITEM_NAME || "";
                    const qty = row.QTY || "";
                    const status = row.STATUS || "";
                    const createdAt = row.CREATED_AT || "";

                    tr.innerHTML =
                        "<td>" + orderId + "</td>" +
                        "<td>" + customerName + "</td>" +
                        "<td>" + phone + "</td>" +
                        "<td>" + address + "</td>" +
                        "<td>" + itemName + "</td>" +
                        "<td>" + qty + "</td>" +
                        "<td><span class='badge text-bg-secondary'>" + status + "</span></td>" +
                        "<td>" + createdAt + "</td>" +
                        "<td>" +
                        "<button class='btn btn-sm btn-outline-primary me-1' onclick='setUpdateForm(" +
                        JSON.stringify(row) +
                        ")'>수정</button>" +
                        "<button class='btn btn-sm btn-outline-success me-1' onclick='updateOrderStatus(\"" + orderId + "\", \"READY\")'>출고대기</button>" +
                        "<button class='btn btn-sm btn-outline-warning me-1' onclick='updateOrderStatus(\"" + orderId + "\", \"SHIPPED\")'>출고완료</button>" +
                        "<button class='btn btn-sm btn-outline-danger' onclick='deleteOrder(\"" + orderId + "\")'>삭제</button>" +
                        "</td>";

                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                alert("주문 목록 조회 실패");
                console.error(error);
            });
    }

    function setUpdateForm(row) {
        document.getElementById("orderId").value = row.ORDER_ID || "";
        document.getElementById("customerName").value = row.CUSTOMER_NAME || "";
        document.getElementById("phone").value = row.PHONE || "";
        document.getElementById("address").value = row.ADDRESS || "";
        document.getElementById("itemName").value = row.ITEM_NAME || "";
        document.getElementById("qty").value = row.QTY || "";
    }

    function clearForm() {
        document.getElementById("orderId").value = "";
        document.getElementById("customerName").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("address").value = "";
        document.getElementById("itemName").value = "";
        document.getElementById("qty").value = "";
    }

    getOrderList();
</script>

</body>
</html>
